<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support Chat | Beat Saber Modding Wiki</title>
  <meta name="robots" content="noindex" />
  <link rel="shortcut icon" href="/assets/logo.png" />
  <link rel="stylesheet" href="/support/chat.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NDRRR0YEW9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-NDRRR0YEW9");
  </script>
  <!-- HTTPS redirect -->
  <script>
    if (location.protocol === "http:" && location.hostname.endsWith("sm0ke.org")) {
      location.replace("https://" + location.host + location.pathname + location.search + location.hash);
    }
  </script>
</head>
<body class="support-page">

  <!-- ── Nav bar ───────────────────────────────────────────────────────── -->
  <header class="support-nav">
    <a href="/" class="support-nav-back">← Wiki</a>
    <a href="/" class="support-nav-title">
      <img src="/assets/logo.png" alt="BSS Wiki logo" />
      <span>BSS Wiki</span>
    </a>
    <div class="support-nav-status">
      <span class="status-pill status-warn" id="status-pill">Connecting</span>
    </div>
  </header>

  <!-- ── Chat shell ─────────────────────────────────────────────────────── -->
  <div class="support-chat-root">
    <section class="chat-shell">
      <div class="chat-status">
        <div class="chat-id">Chat ID <span id="chat-id"></span></div>
        <div class="status-block">
          <span class="status-pill status-error presence-pill" id="presence-pill">Support offline</span>
        </div>
      </div>

      <div class="chat-log" id="chat-log">
        <div class="empty-state" id="empty-state">
          <p>Say hello and our support team will jump in.</p>
        </div>
      </div>

      <footer class="chat-input">
        <div class="input-wrap">
          <div class="input-field">
            <button class="tool-btn inline" id="tool-image" type="button" title="Upload image">+</button>
            <textarea id="message-input" rows="2" placeholder="Type a message or upload an image…"></textarea>
          </div>
          <div class="input-hint" id="input-hint">Shift + Enter for a new line.</div>
        </div>
        <button class="send-button" id="send-button" type="button">›</button>
      </footer>
    </section>
  </div>

  <input id="imgur-input" type="file" accept="image/*" hidden />

  <!-- ── Chat logic ─────────────────────────────────────────────────────── -->
  <script>
  (function initSupportChat() {
    const ui = {
      log: document.getElementById("chat-log"),
      input: document.getElementById("message-input"),
      send: document.getElementById("send-button"),
      status: document.getElementById("status-pill"),
      chatId: document.getElementById("chat-id"),
      empty: document.getElementById("empty-state"),
      toolImage: document.getElementById("tool-image"),
      hint: document.getElementById("input-hint"),
      imgurInput: document.getElementById("imgur-input"),
    };

    const CHAT_API_BASE = "https://bsm-api.sm0ke.org";
    const UPLOAD_API_PATH = "/api/uploads";
    const POLL_INTERVAL_MS = 4000;
    const POLL_IDLE_MS = 12000;
    const STORAGE_KEYS = {
      userId: "supportChatUserId",
      token: "supportChatToken",
      intro: "supportChatIntroSent",
      notifyAsked: "supportChatNotifyAsked",
    };

    const state = {
      userId: getOrCreateUserId(),
      conversationId: null,
      clientToken: localStorage.getItem(STORAGE_KEYS.token) || "",
      displayName: "",
      lastMessageAt: 0,
      renderedIds: new Set(),
      lastDayKey: "",
      messageMap: new Map(),
      notifiedIds: new Set(),
    };
    const analyticsState = { opened: false, historyTracked: false, transportMode: "none" };

    const defaultHint = "Shift + Enter for a new line.";
    const TEXTAREA_MIN_HEIGHT = 48;
    const TEXTAREA_MAX_HEIGHT = 140;

    state.conversationId = state.userId;
    state.displayName = `Guest (${state.userId})`;
    ui.chatId.textContent = state.userId;

    let markdownReady = false;
    let pollTimer = null;
    let idlePolls = 0;
    let eventSource = null;
    let notificationPrompted = false;
    let notificationSound = null;

    function getOrCreateUserId() {
      const existing = localStorage.getItem(STORAGE_KEYS.userId);
      if (existing) return existing;
      const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
      let r = "";
      for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)];
      localStorage.setItem(STORAGE_KEYS.userId, r);
      return r;
    }

    function track(name, params = {}) {
      if (typeof window.gtag !== "function") return;
      const p = {};
      Object.keys(params).forEach(k => {
        const v = params[k];
        if (v === null || v === undefined) return;
        if (typeof v === "boolean") { p[k] = v ? 1 : 0; return; }
        if (typeof v === "number" && isFinite(v)) { p[k] = v; return; }
        const s = String(v).trim().slice(0, 100);
        if (s) p[k] = s;
      });
      window.gtag("event", name, p);
    }

    function messageMetrics(text) {
      const { cleanedText, images } = extractImageUrls(text || "");
      const trimmed = cleanedText.trim();
      return { charCount: trimmed.length, wordCount: trimmed ? trimmed.split(/\s+/).length : 0, imageCount: images.length, hasText: Boolean(trimmed) };
    }

    function setStatus(text, tone) {
      ui.status.textContent = text;
      ui.status.classList.remove("status-ok", "status-warn", "status-error");
      ui.status.classList.add(tone === "ok" ? "status-ok" : tone === "error" ? "status-error" : "status-warn");
    }

    function setHint(msg, tone) {
      ui.hint.textContent = msg;
      ui.hint.classList.remove("warn", "error", "ok");
      if (tone) ui.hint.classList.add(tone);
    }

    function resetHint() { setHint(defaultHint); }

    async function attemptNotificationPrompt(force = false) {
      if (!("Notification" in window)) return false;
      if (Notification.permission === "granted") return true;
      if (Notification.permission === "denied") return false;
      const asked = localStorage.getItem(STORAGE_KEYS.notifyAsked) === "true";
      if (!force && (notificationPrompted || asked)) return false;
      notificationPrompted = true;
      localStorage.setItem(STORAGE_KEYS.notifyAsked, "true");
      try {
        const perm = await Notification.requestPermission();
        track("support_chat_notification_permission", { permission: perm, prompt_mode: force ? "forced" : "automatic" });
        if (perm === "default") { notificationPrompted = false; localStorage.removeItem(STORAGE_KEYS.notifyAsked); }
        return perm === "granted";
      } catch { return false; }
    }

    function playNotificationSound() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!notificationSound) notificationSound = new Ctx();
      const ctx = notificationSound;
      const play = () => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine"; osc.frequency.value = 880; gain.gain.value = 0.08;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
      };
      if (ctx.state === "suspended") { ctx.resume().then(play).catch(() => {}); } else { play(); }
    }

    function autoResizeTextarea() {
      ui.input.style.height = "auto";
      ui.input.style.height = Math.max(Math.min(ui.input.scrollHeight, TEXTAREA_MAX_HEIGHT), TEXTAREA_MIN_HEIGHT) + "px";
    }

    function disableComposer(msg) {
      ui.input.disabled = true; ui.send.disabled = true; ui.toolImage.disabled = true;
      ui.input.placeholder = msg; ui.input.value = ""; autoResizeTextarea();
    }

    function apiUrl(path) { return CHAT_API_BASE.replace(/\/+$/, "") + path; }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, options);
      const text = await res.text();
      let data = {};
      try { if (text) data = JSON.parse(text); } catch {}
      if (!res.ok) throw new Error(data.error || res.statusText || "Request failed");
      return data;
    }

    function renderMarkdown(text) {
      if (!window.marked || !window.DOMPurify) return { html: text, isHtml: false };
      if (!markdownReady) { window.marked.setOptions({ breaks: true, gfm: true }); markdownReady = true; }
      const dirty = window.marked.parse(text.replace(/(^|\n)-#\s?(.*?)(?=\n|$)/g, (m, p, c) => c.trim() ? `${p}<small>${c.trim()}</small>` : m));
      return { html: window.DOMPurify.sanitize(dirty, { ADD_TAGS: ["small"] }), isHtml: true };
    }

    function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : ""; }
    function dayKey(ts) { return ts ? new Date(ts).toDateString() : ""; }
    function formatDayLabel(ts) {
      if (!ts) return "";
      const d = new Date(ts), now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today.getTime() - 86400000);
      if (d >= today) return "Today";
      if (d >= yesterday) return "Yesterday";
      return d.toLocaleDateString();
    }

    function appendDayDivider(ts) {
      const div = document.createElement("div"); div.className = "day-divider";
      const span = document.createElement("span"); span.textContent = formatDayLabel(ts);
      div.appendChild(span); ui.log.appendChild(div);
    }

    function extractImageUrls(text) {
      const regex = /https?:\/\/(?:i\.|cdn\.)?allthepics\.net\/[^\s]+?\.(?:png|jpe?g|gif|webp)(?:\?[^\s]+)?/g;
      const matches = text.match(regex) || [];
      let cleaned = text;
      matches.forEach(url => { cleaned = cleaned.replace(url, "").trim(); });
      return { cleanedText: cleaned, images: matches };
    }

    function buildMessageActions(message) {
      if (message.role !== "user" || message.senderId !== state.userId) return null;
      const actions = document.createElement("div"); actions.className = "message-actions";
      const edit = document.createElement("button"); edit.type = "button"; edit.className = "message-action"; edit.textContent = "Edit";
      edit.addEventListener("click", () => handleEditMessage(message));
      const del = document.createElement("button"); del.type = "button"; del.className = "message-action"; del.textContent = "Delete";
      del.addEventListener("click", () => handleDeleteMessage(message));
      actions.appendChild(edit); actions.appendChild(del);
      return actions;
    }

    function buildMessageElement(message) {
      const role = message.role === "support" ? "support" : message.role === "system" ? "system" : "user";
      const wrapper = document.createElement("div"); wrapper.className = `message ${role}`; wrapper.dataset.id = message.id || "";
      const bubble = document.createElement("div"); bubble.className = "bubble";
      const { cleanedText, images } = extractImageUrls(message.text || "");
      if (cleanedText) {
        const body = document.createElement("div"); body.className = "body";
        const rendered = renderMarkdown(cleanedText);
        if (rendered.isHtml) body.innerHTML = rendered.html; else body.textContent = rendered.html;
        bubble.appendChild(body);
      }
      if (images.length) {
        const grid = document.createElement("div"); grid.className = "image-grid";
        images.forEach(url => {
          const img = document.createElement("img"); img.src = url; img.alt = "Uploaded image"; img.loading = "lazy";
          grid.appendChild(img);
        });
        bubble.appendChild(grid);
      }
      const time = document.createElement("div"); time.className = "time"; time.textContent = formatTime(message.createdAt);
      bubble.appendChild(time);
      wrapper.appendChild(bubble);
      const actions = buildMessageActions(message);
      if (actions) wrapper.appendChild(actions);
      return wrapper;
    }

    function updateEmptyState() { ui.empty.style.display = state.renderedIds.size ? "none" : "block"; }
    function isNearBottom() { return (ui.log.scrollHeight - ui.log.scrollTop - ui.log.clientHeight) < 120; }
    function scrollToBottom() { ui.log.scrollTop = ui.log.scrollHeight; }

    function renderMessages(messages, forceScroll) {
      const prev = state.lastMessageAt;
      const offset = ui.log.scrollHeight - ui.log.scrollTop;
      const had = state.renderedIds.size > 0;
      ui.log.innerHTML = ""; state.renderedIds = new Set(); state.lastDayKey = ""; state.lastMessageAt = 0; state.messageMap.clear();
      appendMessages(messages, forceScroll, prev, true);
      if (!had || forceScroll) { scrollToBottom(); } else { ui.log.scrollTop = Math.max(0, ui.log.scrollHeight - offset); }
      if (!analyticsState.historyTracked) {
        analyticsState.historyTracked = true;
        const s = summarizeMessages(messages);
        track("support_chat_history_loaded", { total_count: s.totalCount, support_count: s.supportCount, system_count: s.systemCount, user_count: s.userCount, image_message_count: s.imageMessageCount, text_message_count: s.textMessageCount });
      }
    }

    function summarizeMessages(messages) {
      const s = { totalCount: 0, supportCount: 0, systemCount: 0, userCount: 0, imageMessageCount: 0, textMessageCount: 0 };
      (messages || []).forEach(m => {
        if (!m || !m.id || m.deletedAt) return;
        s.totalCount++;
        if (m.role === "support") s.supportCount++; else if (m.role === "system") s.systemCount++; else s.userCount++;
        const met = messageMetrics(m.text || "");
        if (met.imageCount) s.imageMessageCount++;
        if (met.hasText) s.textMessageCount++;
      });
      return s;
    }

    function appendMessages(messages, forceScroll, prevLast = 0, skipScroll = false) {
      if (!Array.isArray(messages) || !messages.length) { updateEmptyState(); return; }
      const sorted = [...messages].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      let hasNew = false;
      const newIncoming = [];
      sorted.forEach(message => {
        if (!message || !message.id || state.renderedIds.has(message.id)) return;
        const k = dayKey(message.createdAt);
        if (k && k !== state.lastDayKey) { appendDayDivider(message.createdAt); state.lastDayKey = k; }
        state.renderedIds.add(message.id);
        ui.log.appendChild(buildMessageElement(message));
        state.lastMessageAt = Math.max(state.lastMessageAt, message.createdAt || 0);
        state.messageMap.set(message.id, message);
        if (shouldNotify(message, prevLast)) { state.notifiedIds.add(message.id); notifyMessage(message); }
        if (prevLast && (message.createdAt || 0) > prevLast && message.role !== "user") newIncoming.push(message);
        hasNew = true;
      });
      if (!skipScroll && hasNew && (forceScroll || isNearBottom())) scrollToBottom();
      updateEmptyState();
      if (newIncoming.length) {
        const s = summarizeMessages(newIncoming);
        track("support_chat_messages_received", { batch_count: s.totalCount, support_count: s.supportCount, system_count: s.systemCount, image_message_count: s.imageMessageCount, text_message_count: s.textMessageCount, transport_mode: analyticsState.transportMode });
      }
    }

    async function postMessage(text, role) {
      const headers = { "Content-Type": "application/json" };
      if (state.clientToken) headers["X-Client-Token"] = state.clientToken;
      const data = await fetchJson(apiUrl("/api/messages"), {
        method: "POST", headers,
        body: JSON.stringify({ conversationId: state.conversationId, senderId: state.userId, senderName: state.displayName, text, role, clientToken: state.clientToken }),
      });
      if (data.clientToken && data.clientToken !== state.clientToken) {
        state.clientToken = data.clientToken;
        localStorage.setItem(STORAGE_KEYS.token, data.clientToken);
      }
      return data;
    }

    async function updateMessage(messageId, text) {
      const headers = { "Content-Type": "application/json" };
      if (state.clientToken) headers["X-Client-Token"] = state.clientToken;
      const data = await fetchJson(apiUrl("/api/messages"), {
        method: "PATCH", headers,
        body: JSON.stringify({ conversationId: state.conversationId, messageId, text, senderId: state.userId, clientToken: state.clientToken }),
      });
      if (data && data.message) { state.messageMap.set(data.message.id, data.message); replaceMessageNode(data.message); }
    }

    async function deleteMessage(messageId) {
      const headers = { "Content-Type": "application/json" };
      if (state.clientToken) headers["X-Client-Token"] = state.clientToken;
      await fetchJson(apiUrl("/api/messages"), {
        method: "DELETE", headers,
        body: JSON.stringify({ conversationId: state.conversationId, messageId, senderId: state.userId, clientToken: state.clientToken }),
      });
      removeMessageNode(messageId);
    }

    function replaceMessageNode(message) {
      const existing = ui.log.querySelector(`[data-id="${message.id}"]`);
      const node = buildMessageElement(message);
      if (existing) existing.replaceWith(node); else { state.renderedIds.add(message.id); ui.log.appendChild(node); }
    }

    function removeMessageNode(id) {
      const el = ui.log.querySelector(`[data-id="${id}"]`);
      if (el) el.remove();
      state.renderedIds.delete(id); state.messageMap.delete(id); updateEmptyState();
    }

    async function handleEditMessage(message) {
      const current = message.text || "";
      const next = window.prompt("Edit message:", current);
      if (next === null) return;
      const trimmed = next.trim();
      if (!trimmed || trimmed === current) return;
      setHint("Saving edit...", "warn");
      try {
        await updateMessage(message.id, trimmed);
        track("support_chat_message_edit", { before_char_count: current.trim().length, after_char_count: trimmed.length, success: true });
        setHint("Message updated.", "ok");
      } catch {
        track("support_chat_message_edit", { before_char_count: current.trim().length, after_char_count: trimmed.length, success: false });
        setHint("Edit failed.", "error");
      } finally { setTimeout(resetHint, 2500); }
    }

    async function handleDeleteMessage(message) {
      if (!window.confirm("Delete this message?")) return;
      setHint("Deleting message...", "warn");
      try {
        await deleteMessage(message.id);
        track("support_chat_message_delete", { success: true });
        setHint("Message deleted.", "ok");
      } catch {
        track("support_chat_message_delete", { success: false });
        setHint("Delete failed.", "error");
      } finally { setTimeout(resetHint, 2500); }
    }

    async function loadMessages({ incremental = false } = {}) {
      const params = new URLSearchParams({ conversationId: state.conversationId });
      if (state.clientToken) params.set("token", state.clientToken);
      if (incremental && state.lastMessageAt) params.set("after", String(state.lastMessageAt));
      const data = await fetchJson(apiUrl(`/api/messages?${params}`));
      if (incremental) {
        const prev = state.lastMessageAt;
        appendMessages(data.messages || [], false, prev);
        idlePolls = (data.messages && data.messages.length) ? 0 : Math.min(idlePolls + 1, 5);
        return;
      }
      renderMessages(data.messages || [], false);
    }

    function shouldNotify(message, prev) {
      if (!message || message.role === "user" || message.deletedAt) return false;
      if (!prev || message.createdAt <= prev) return false;
      if (state.notifiedIds.has(message.id)) return false;
      if (document.hasFocus()) return false;
      return true;
    }

    function notifyMessage(message) {
      if ("Notification" in window && Notification.permission === "granted") {
        const n = new Notification("Support reply", { body: (message.text || "").slice(0, 160) });
        n.onclick = () => window.focus();
        return;
      }
      playNotificationSound();
    }

    async function sendIntroMessage() {
      const introSent = localStorage.getItem(STORAGE_KEYS.intro) === "true";
      const text = introSent
        ? `Chat session resumed. User ID: ${state.userId}`
        : `Hello, I need assistance. I have tried turning off/on and waiting and I read the faq at https://wiki.sm0ke.org/faq`;
      const data = await postMessage(text, "system");
      localStorage.setItem(STORAGE_KEYS.intro, "true");
      track("support_chat_intro_sent", { intro_mode: introSent ? "resume" : "first_contact" });
      if (data && data.message) appendMessages([data.message], true, state.lastMessageAt);
    }

    async function handleSend() {
      const text = ui.input.value.trim();
      if (!text) return;
      const metrics = messageMetrics(text);
      ui.send.disabled = true;
      try {
        const data = await postMessage(text, "user");
        ui.input.value = ""; autoResizeTextarea();
        if (data && data.message) appendMessages([data.message], true, state.lastMessageAt);
        track("support_chat_message_send", { message_type: metrics.imageCount ? (metrics.hasText ? "mixed" : "image") : "text", char_count: metrics.charCount, word_count: metrics.wordCount, image_count: metrics.imageCount, success: true });
        setStatus("Online", "ok");
      } catch {
        track("support_chat_message_send", { message_type: "text", char_count: metrics.charCount, word_count: metrics.wordCount, success: false });
        setStatus("Send failed", "error");
      } finally { ui.send.disabled = false; }
    }

    async function sendImageMessage(urls) {
      if (!urls) return;
      ui.send.disabled = true;
      try {
        const data = await postMessage(urls, "user");
        if (data && data.message) appendMessages([data.message], true, state.lastMessageAt);
        track("support_chat_message_send", { message_type: "image", success: true });
      } catch {
        track("support_chat_message_send", { message_type: "image", success: false });
        setHint("Image send failed.", "error");
      } finally { ui.send.disabled = false; }
    }

    async function uploadImage(file) {
      const fd = new FormData(); fd.append("source", file);
      const data = await fetchJson(apiUrl(UPLOAD_API_PATH), { method: "POST", body: fd });
      const link = data?.url || data?.image?.url || data?.image?.display_url || data?.data?.url || data?.data?.link;
      if (!link) throw new Error("Upload failed");
      return link;
    }

    async function handleImageUpload() {
      const files = Array.from(ui.imgurInput.files || []);
      ui.imgurInput.value = "";
      if (!files.length) return;
      const hadDraft = Boolean(ui.input.value.trim());
      track("support_chat_image_upload_start", { file_count: files.length, draft_text_present: hadDraft });
      setHint("Uploading image...", "warn");
      ui.send.disabled = true; ui.input.disabled = true; ui.toolImage.disabled = true;
      try {
        const links = [];
        for (const f of files) links.push(await uploadImage(f));
        const joined = links.join(" ");
        if (ui.input.value.trim()) {
          ui.input.value = `${ui.input.value.trim()} ${joined}`;
          setHint("Image added.", "ok"); autoResizeTextarea();
          track("support_chat_image_upload_complete", { file_count: files.length, delivery: "draft", success: true });
        } else {
          await sendImageMessage(joined);
          setHint("Image sent.", "ok");
          track("support_chat_image_upload_complete", { file_count: files.length, delivery: "sent", success: true });
        }
      } catch {
        track("support_chat_image_upload_complete", { file_count: files.length, success: false });
        setHint("Image upload failed.", "error");
      } finally {
        ui.send.disabled = false; ui.input.disabled = false; ui.toolImage.disabled = false;
        setTimeout(resetHint, 2500);
      }
    }

    function schedulePoll() {
      if (eventSource) return;
      if (analyticsState.transportMode !== "poll") {
        analyticsState.transportMode = "poll";
        track("support_chat_transport_mode", { mode: "poll", reason: "fallback" });
      }
      if (pollTimer) clearTimeout(pollTimer);
      pollTimer = setTimeout(() => {
        loadMessages({ incremental: true }).catch(() => setStatus("Offline", "error")).finally(schedulePoll);
      }, idlePolls > 2 ? POLL_IDLE_MS : POLL_INTERVAL_MS);
    }

    function startStream() {
      if (!("EventSource" in window)) return false;
      if (eventSource) eventSource.close();
      analyticsState.transportMode = "sse";
      track("support_chat_transport_mode", { mode: "sse", reason: "preferred" });
      const params = new URLSearchParams({ conversationId: state.conversationId });
      if (state.clientToken) params.set("token", state.clientToken);
      if (state.lastMessageAt) params.set("after", String(state.lastMessageAt));
      eventSource = new EventSource(apiUrl(`/api/stream?${params}`));

      eventSource.addEventListener("messages", e => {
        let payload = {};
        try { payload = JSON.parse(e.data || "{}"); } catch {}
        const msgs = payload.messages || [];
        if (msgs.length) appendMessages(msgs, false, state.lastMessageAt);
        setStatus("Online", "ok");
      });

      eventSource.onopen = () => {
        track("support_chat_connection_state", { state: "online", transport_mode: "sse" });
        setStatus("Online", "ok");
        if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
      };

      eventSource.onerror = () => {
        track("support_chat_connection_state", { state: "offline", transport_mode: "sse" });
        setStatus("Offline", "error");
        if (eventSource) { eventSource.close(); eventSource = null; }
        idlePolls = 0;
        schedulePoll();
      };

      return true;
    }

    async function bootstrap() {
      if (!analyticsState.opened) {
        analyticsState.opened = true;
        track("support_chat_open", { session_type: state.clientToken ? "returning" : "new" });
      }
      setStatus("Connecting", "warn");
      try {
        if (!state.clientToken) await sendIntroMessage();
        await loadMessages();
        setStatus("Online", "ok");
      } catch {
        track("support_chat_bootstrap_error", { has_token: Boolean(state.clientToken) });
        setStatus("Offline", "error");
      }
      if (!startStream()) schedulePoll();
      attemptNotificationPrompt().catch(() => {});
    }

    document.addEventListener("click", () => {
      attemptNotificationPrompt(true).catch(() => {});
      if (notificationSound && notificationSound.state === "suspended") notificationSound.resume().catch(() => {});
    }, { once: true });

    ui.send.addEventListener("click", handleSend);
    ui.input.addEventListener("input", autoResizeTextarea);
    ui.input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } });
    ui.toolImage.addEventListener("click", () => ui.imgurInput.click());
    ui.imgurInput.addEventListener("change", handleImageUpload);

    autoResizeTextarea();
    bootstrap();
  })();
  </script>

</body>
</html>
