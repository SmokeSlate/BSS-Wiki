<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beat Saber Troubleshooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="/assets/troubleshooter.js"></script>
    <link rel="icon" href="/assets/logo.png" />
    <meta
      name="description"
      content="Beat Saber troubleshooting form."
    />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NDRRR0YEW9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-NDRRR0YEW9");
    </script>
    <style>
      .md-copy p + p,
      .md-copy ul + p,
      .md-copy ol + p,
      .md-copy p + ul,
      .md-copy p + ol,
      .md-copy ul + ul,
      .md-copy ol + ol {
        margin-top: 0.9rem;
      }

      .md-copy ul,
      .md-copy ol {
        padding-left: 1.25rem;
      }

      .md-copy ul {
        list-style: disc;
      }

      .md-copy ol {
        list-style: decimal;
      }

      .md-copy li + li {
        margin-top: 0.35rem;
      }

      .md-copy a {
        color: #a5b4fc;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .md-copy code {
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(55, 65, 81, 1);
        border-radius: 0.45rem;
        padding: 0.1rem 0.35rem;
        font-size: 0.92em;
      }

      .md-copy pre {
        overflow-x: auto;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(55, 65, 81, 1);
        border-radius: 0.9rem;
        padding: 0.9rem 1rem;
        margin-top: 0.9rem;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-900 text-white">
    <main class="max-w-5xl mx-auto px-4 py-10 text-center">
      <img src="/assets/logo.png" alt="Beat Saber Wiki" class="h-20 w-20 rounded-xl mx-auto mb-5" />
      <h1 class="text-4xl font-bold">Beat Saber Troubleshooter</h1>
      <p class="text-xl text-gray-300 mt-3">Choose your version and follow the form.</p>
      <p id="loaded-at" class="text-xs text-gray-500 mt-3">Loading form...</p>

      <div id="diagnose-section" class="hidden mt-8 text-left"></div>

      <div
        id="status"
        class="hidden mb-6 mt-6 rounded-xl border px-4 py-3 text-sm text-left"
        role="status"
        aria-live="polite"
      ></div>

      <div id="runtime" class="mt-8"></div>
    </main>

    <script>
      (function bootstrapDiagnose() {
        var LOGS_API = "https://logs.sm0ke.org";
        var section = document.getElementById("diagnose-section");

        var params = new URLSearchParams(window.location.search);
        var logCode = (params.get("log") || "").trim().toLowerCase();
        if (!logCode) return;

        section.classList.remove("hidden");
        section.innerHTML = renderCard("loading", logCode);

        fetch(LOGS_API + "/diagnose/" + encodeURIComponent(logCode), { signal: AbortSignal.timeout(35000) })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (!data.ok) throw new Error(data.error || "Diagnosis failed.");
            section.innerHTML = renderCard("done", logCode, data.diagnosis);
          })
          .catch(function (err) {
            section.innerHTML = renderCard("error", logCode, null, err.message || "Could not complete diagnosis.");
          });

        function renderCard(state, code, diagnosis, errorMsg) {
          var logsUrl = LOGS_API + "/" + encodeURIComponent(code);
          var diagUrl = LOGS_API + "/diagnose/" + encodeURIComponent(code);

          var header =
            '<div class="flex items-start justify-between gap-4 mb-4">' +
              '<div>' +
                '<h2 class="text-2xl font-bold text-white">AI Diagnosis</h2>' +
                '<p class="text-sm text-gray-400 mt-1">Log code: <code class="bg-gray-900 border border-gray-700 rounded px-1">' + escapeHtml(code) + '</code></p>' +
              '</div>' +
              '<a href="' + escapeHtml(logsUrl) + '" target="_blank" rel="noopener" class="shrink-0 text-xs text-indigo-400 underline underline-offset-2 hover:text-indigo-300 mt-1">View full logs →</a>' +
            '</div>';

          if (state === "loading") {
            return (
              '<div class="rounded-xl border border-indigo-400/20 bg-indigo-500/5 px-6 py-5">' +
                header +
                '<div class="flex items-center gap-3 text-indigo-300 text-sm">' +
                  '<svg class="animate-spin h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>' +
                  '<span>Analyzing your logs with AI — this may take up to 30 seconds…</span>' +
                '</div>' +
              '</div>'
            );
          }

          if (state === "error") {
            return (
              '<div class="rounded-xl border border-rose-400/30 bg-rose-500/10 px-6 py-5">' +
                header +
                '<p class="text-rose-300 text-sm">' + escapeHtml(errorMsg || "Unknown error") + '</p>' +
                '<p class="text-gray-500 text-xs mt-3">You can still <a href="' + escapeHtml(logsUrl) + '" target="_blank" rel="noopener" class="text-indigo-400 underline">view your logs manually</a> or try the <a href="' + escapeHtml(diagUrl) + '" target="_blank" rel="noopener" class="text-indigo-400 underline">diagnose endpoint</a> directly.</p>' +
              '</div>'
            );
          }

          var diagHtml = (typeof window.marked !== "undefined" && typeof window.DOMPurify !== "undefined")
            ? window.DOMPurify.sanitize(window.marked.parse(diagnosis || ""))
            : "<pre class=\"whitespace-pre-wrap text-sm\">" + escapeHtml(diagnosis || "") + "</pre>";

          return (
            '<div class="rounded-xl border border-indigo-400/20 bg-gray-800 px-6 py-5">' +
              header +
              '<div class="md-copy text-gray-200 text-sm leading-relaxed">' + diagHtml + '</div>' +
              '<div class="mt-5 pt-4 border-t border-gray-700 flex flex-wrap gap-3 text-xs">' +
                '<a href="' + escapeHtml(logsUrl) + '" target="_blank" rel="noopener" class="text-indigo-400 underline underline-offset-2 hover:text-indigo-300">Full log viewer</a>' +
                '<span class="text-gray-600">·</span>' +
                '<button type="button" onclick="rerunDiagnose()" class="text-indigo-400 underline underline-offset-2 hover:text-indigo-300">Re-run diagnosis</button>' +
              '</div>' +
            '</div>'
          );
        }

        function escapeHtml(v) {
          return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }

        window.rerunDiagnose = function () {
          section.innerHTML = renderCard("loading", logCode);
          fetch(LOGS_API + "/diagnose/" + encodeURIComponent(logCode), { signal: AbortSignal.timeout(35000) })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              if (!data.ok) throw new Error(data.error || "Diagnosis failed.");
              section.innerHTML = renderCard("done", logCode, data.diagnosis);
            })
            .catch(function (err) {
              section.innerHTML = renderCard("error", logCode, null, err.message || "Could not complete diagnosis.");
            });
        };
      })();
    </script>

    <script>
      (function bootstrapFixPage() {
        var runtimeEl = document.getElementById("runtime");
        var statusEl = document.getElementById("status");
        var loadedAtEl = document.getElementById("loaded-at");
        var defaultUrl = "/assets/fix-flow.json";
        var previewKey = "bss-troubleshooter-builder-preview";

        function setStatus(message, tone) {
          if (!message) {
            statusEl.className = "hidden mb-6 mt-6 rounded-xl border px-4 py-3 text-sm text-left";
            statusEl.textContent = "";
            return;
          }

          var base = "mb-6 mt-6 rounded-xl border px-4 py-3 text-sm text-left";
          var styles = tone === "error"
            ? " border-rose-400/30 bg-rose-500/10 text-rose-100"
            : " border-indigo-400/30 bg-indigo-500/10 text-indigo-100";
          statusEl.className = base + styles;
          statusEl.textContent = message;
        }

        function renderFlow(data, fileLabel) {
          Troubleshooter.renderRuntime(runtimeEl, data, {
            analyticsContext: {
              flowSource: fileLabel === "builder preview" ? "builder_preview" : "default",
            },
          });
          loadedAtEl.textContent = (fileLabel === "builder preview" ? "Preview updated " : "Updated ") + new Date().toLocaleString();
        }

        function loadDefaultFlow() {
          return Troubleshooter.loadJsonUrl(defaultUrl).then(function (data) {
            renderFlow(data, defaultUrl);
            setStatus("", "success");
          });
        }

        function tryBuilderPreview() {
          var params = new URLSearchParams(window.location.search);
          if (params.get("source") !== "builder") {
            return Promise.reject(new Error("No builder preview requested."));
          }

          var raw = localStorage.getItem(previewKey);
          if (!raw) {
            return Promise.reject(new Error("No builder preview is stored yet."));
          }

          try {
            renderFlow(Troubleshooter.normalizeData(JSON.parse(raw)), "builder preview");
            setStatus("", "success");
            return Promise.resolve();
          } catch (error) {
            return Promise.reject(error);
          }
        }

        tryBuilderPreview().catch(function () {
          return loadDefaultFlow().catch(function (error) {
            if (typeof window.gtag === "function") {
              window.gtag("event", "troubleshooter_load_error", {
                flow_source: "default",
                error_message: String(error && error.message ? error.message : "unknown error").slice(0, 100),
              });
            }
            setStatus(error.message || "Could not load the troubleshooting form.", "error");
          });
        });
      })();
    </script>
  </body>
</html>
