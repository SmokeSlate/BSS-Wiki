<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beat Saber Troubleshooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="/assets/troubleshooter.js"></script>
    <link rel="icon" href="/assets/logo.png" />
    <meta
      name="description"
      content="Beat Saber troubleshooting form."
    />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NDRRR0YEW9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-NDRRR0YEW9");
    </script>
    <style>
      .md-copy p + p,
      .md-copy ul + p,
      .md-copy ol + p,
      .md-copy p + ul,
      .md-copy p + ol,
      .md-copy ul + ul,
      .md-copy ol + ol {
        margin-top: 0.9rem;
      }

      .md-copy ul,
      .md-copy ol {
        padding-left: 1.25rem;
      }

      .md-copy ul {
        list-style: disc;
      }

      .md-copy ol {
        list-style: decimal;
      }

      .md-copy li + li {
        margin-top: 0.35rem;
      }

      .md-copy a {
        color: #a5b4fc;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .md-copy code {
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(55, 65, 81, 1);
        border-radius: 0.45rem;
        padding: 0.1rem 0.35rem;
        font-size: 0.92em;
      }

      .md-copy pre {
        overflow-x: auto;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(55, 65, 81, 1);
        border-radius: 0.9rem;
        padding: 0.9rem 1rem;
        margin-top: 0.9rem;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-900 text-white">
    <main class="max-w-5xl mx-auto px-4 py-10">
      <div class="text-center">
        <img src="/assets/logo.png" alt="Beat Saber Wiki" class="h-20 w-20 rounded-xl mx-auto mb-5" />
        <h1 class="text-4xl font-bold" id="page-title">Beat Saber Troubleshooter</h1>
        <p class="text-xl text-gray-300 mt-3" id="page-subtitle">Choose your version and follow the form.</p>
        <p id="loaded-at" class="text-xs text-gray-500 mt-3">Loading form...</p>
      </div>

      <div id="diagnose-section" class="hidden mt-8 text-left"></div>

      <div id="troubleshooter-wrap" class="mt-8">
        <div
          id="status"
          class="hidden mb-6 rounded-xl border px-4 py-3 text-sm text-left"
          role="status"
          aria-live="polite"
        ></div>
        <div id="runtime"></div>
      </div>
    </main>

    <script>
      (function bootstrapDiagnose() {
        var LOGS_API = "https://logs.sm0ke.org";
        var section = document.getElementById("diagnose-section");
        var tsWrap = document.getElementById("troubleshooter-wrap");
        var pageTitle = document.getElementById("page-title");
        var pageSubtitle = document.getElementById("page-subtitle");

        var params = new URLSearchParams(window.location.search);
        var logCode = (params.get("log") || "").trim().toLowerCase();
        if (!logCode) return;

        // Switch the page into diagnosis mode
        pageTitle.textContent = "AI Diagnosis";
        pageSubtitle.textContent = "Analyzing log " + logCode + " — results appear below.";
        section.classList.remove("hidden");
        section.innerHTML = renderCard("loading", logCode);

        // Collapse the troubleshooter behind a toggle — it's secondary here
        tsWrap.innerHTML =
          '<details class="mt-10 group">' +
            '<summary class="cursor-pointer text-sm text-gray-500 hover:text-gray-300 select-none list-none flex items-center gap-2">' +
              '<svg class="h-4 w-4 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>' +
              'Open interactive troubleshooter' +
            '</summary>' +
            '<div id="ts-inner" class="mt-4">' +
              '<div id="status" class="hidden mb-6 rounded-xl border px-4 py-3 text-sm text-left" role="status" aria-live="polite"></div>' +
              '<div id="runtime"></div>' +
            '</div>' +
          '</details>';

        doFetch(logCode);

        function doFetch(code) {
          fetch(LOGS_API + "/diagnose/" + encodeURIComponent(code), { signal: AbortSignal.timeout(40000) })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              if (!data.ok) throw new Error(data.error || "Diagnosis failed.");
              section.innerHTML = renderCard("done", code, data.diagnosis);
              initChat(code);
            })
            .catch(function (err) {
              section.innerHTML = renderCard("error", code, null, err.message || "Could not complete diagnosis.");
            });
        }

        function renderCard(state, code, diagnosis, errorMsg) {
          var logsUrl = LOGS_API + "/" + encodeURIComponent(code);

          var header =
            '<div class="flex items-start justify-between gap-4 mb-5">' +
              '<div>' +
                '<p class="text-xs text-gray-500 uppercase tracking-widest mb-1">AI Diagnosis</p>' +
                '<p class="text-sm text-gray-400">Log: <code class="bg-gray-900 border border-gray-700 rounded px-1.5 py-0.5">' + escapeHtml(code) + '</code></p>' +
              '</div>' +
              '<a href="' + escapeHtml(logsUrl) + '" target="_blank" rel="noopener" ' +
                'class="shrink-0 text-xs text-indigo-400 underline underline-offset-2 hover:text-indigo-300 mt-1">' +
                'View raw logs →' +
              '</a>' +
            '</div>';

          if (state === "loading") {
            return (
              '<div class="rounded-xl border border-indigo-400/20 bg-indigo-500/5 px-6 py-6">' +
                header +
                '<div class="flex items-center gap-3 text-indigo-200 text-sm">' +
                  '<svg class="animate-spin h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24">' +
                    '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>' +
                    '<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>' +
                  '</svg>' +
                  '<span>Reading your logs and generating a diagnosis — up to 30 seconds…</span>' +
                '</div>' +
              '</div>'
            );
          }

          if (state === "error") {
            return (
              '<div class="rounded-xl border border-rose-400/30 bg-rose-500/10 px-6 py-6">' +
                header +
                '<p class="text-rose-300 text-sm">' + escapeHtml(errorMsg || "Unknown error") + '</p>' +
                '<div class="mt-4 flex flex-wrap gap-3 text-xs">' +
                  '<button type="button" onclick="rerunDiagnose()" ' +
                    'class="text-indigo-400 underline underline-offset-2 hover:text-indigo-300">Try again</button>' +
                  '<span class="text-gray-600">·</span>' +
                  '<a href="' + escapeHtml(logsUrl) + '" target="_blank" rel="noopener" ' +
                    'class="text-indigo-400 underline underline-offset-2 hover:text-indigo-300">View raw logs</a>' +
                '</div>' +
              '</div>'
            );
          }

          var diagHtml = (typeof window.marked !== "undefined" && typeof window.DOMPurify !== "undefined")
            ? window.DOMPurify.sanitize(window.marked.parse(diagnosis || ""))
            : "<pre class=\"whitespace-pre-wrap text-sm\">" + escapeHtml(diagnosis || "") + "</pre>";

          return (
            '<div class="rounded-xl border border-indigo-400/20 bg-gray-800 px-6 py-6" id="diag-card">' +
              header +
              '<div class="md-copy text-gray-100 text-sm leading-relaxed">' + diagHtml + '</div>' +
              '<div class="mt-6 pt-4 border-t border-gray-700 flex flex-wrap gap-4 text-xs">' +
                '<a href="' + escapeHtml(logsUrl) + '" target="_blank" rel="noopener" ' +
                  'class="text-indigo-400 underline underline-offset-2 hover:text-indigo-300">View raw logs</a>' +
                '<span class="text-gray-600">·</span>' +
                '<button type="button" onclick="rerunDiagnose()" ' +
                  'class="text-indigo-400 underline underline-offset-2 hover:text-indigo-300">Re-run diagnosis</button>' +
              '</div>' +
              // ── Follow-up chat ──
              '<div class="mt-6 pt-5 border-t border-gray-700">' +
                '<p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Ask a follow-up</p>' +
                '<div id="chat-history" class="space-y-3 mb-4"></div>' +
                '<div class="flex gap-2">' +
                  '<input id="chat-input" type="text" maxlength="500" ' +
                    'placeholder="e.g. Why is QuestSounds logging errors?" ' +
                    'class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white ' +
                    'placeholder-gray-600 focus:outline-none focus:border-indigo-500 transition-colors" />' +
                  '<button id="chat-send" type="button" ' +
                    'class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white text-sm ' +
                    'font-medium rounded-lg transition-colors shrink-0">Ask</button>' +
                '</div>' +
                '<p id="chat-status" class="text-xs text-gray-500 mt-2 min-h-[1rem]"></p>' +
              '</div>' +
            '</div>'
          );
        }

        // ── Chat state & logic ──
        var chatHistory = []; // { role, content } pairs sent to API

        function renderChatMessage(role, content) {
          var isUser = role === "user";
          var mdContent = !isUser && typeof window.marked !== "undefined" && typeof window.DOMPurify !== "undefined"
            ? window.DOMPurify.sanitize(window.marked.parse(content || ""))
            : "<span>" + escapeHtml(content || "") + "</span>";

          var histEl = document.getElementById("chat-history");
          if (!histEl) return;
          var msg = document.createElement("div");
          msg.className = isUser
            ? "text-sm text-gray-300 bg-gray-900/60 rounded-lg px-3 py-2 text-right"
            : "text-sm text-gray-100 md-copy leading-relaxed";
          msg.innerHTML = isUser ? escapeHtml(content) : mdContent;
          histEl.appendChild(msg);
          msg.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        function setChatStatus(msg, isError) {
          var el = document.getElementById("chat-status");
          if (!el) return;
          el.textContent = msg || "";
          el.className = "text-xs mt-2 min-h-[1rem] " + (isError ? "text-rose-400" : "text-gray-500");
        }

        function initChat(code) {
          var sendBtn = document.getElementById("chat-send");
          var input = document.getElementById("chat-input");
          if (!sendBtn || !input) return;

          function send() {
            var q = input.value.trim();
            if (!q || sendBtn.disabled) return;
            input.value = "";
            sendBtn.disabled = true;
            setChatStatus("Thinking…");
            renderChatMessage("user", q);

            fetch(LOGS_API + "/followup/" + encodeURIComponent(code), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question: q, history: chatHistory }),
              signal: AbortSignal.timeout(45000),
            })
              .then(function (r) { return r.json(); })
              .then(function (data) {
                sendBtn.disabled = false;
                if (!data.ok) {
                  var msg = data.error || "Error";
                  if (data.retryAfter) msg += " (retry in " + data.retryAfter + "s)";
                  if (data.banned) msg = "⛔ " + msg;
                  setChatStatus(msg, true);
                  return;
                }
                chatHistory.push({ role: "user", content: q });
                chatHistory.push({ role: "assistant", content: data.answer });
                // keep last 10 messages (5 exchanges)
                if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
                renderChatMessage("assistant", data.answer);
                setChatStatus("");
              })
              .catch(function (err) {
                sendBtn.disabled = false;
                setChatStatus(err.message || "Request failed", true);
              });
          }

          sendBtn.addEventListener("click", send);
          input.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
          });
        }

        function escapeHtml(v) {
          return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }

        window.rerunDiagnose = function () {
          chatHistory = [];
          section.innerHTML = renderCard("loading", logCode);
          doFetch(logCode);
        };
      })();
    </script>

    <script>
      (function bootstrapFixPage() {
        var runtimeEl = document.getElementById("runtime");
        var statusEl = document.getElementById("status");
        var loadedAtEl = document.getElementById("loaded-at");
        var defaultUrl = "/assets/fix-flow.json";
        var previewKey = "bss-troubleshooter-builder-preview";

        function setStatus(message, tone) {
          if (!message) {
            statusEl.className = "hidden mb-6 mt-6 rounded-xl border px-4 py-3 text-sm text-left";
            statusEl.textContent = "";
            return;
          }

          var base = "mb-6 mt-6 rounded-xl border px-4 py-3 text-sm text-left";
          var styles = tone === "error"
            ? " border-rose-400/30 bg-rose-500/10 text-rose-100"
            : " border-indigo-400/30 bg-indigo-500/10 text-indigo-100";
          statusEl.className = base + styles;
          statusEl.textContent = message;
        }

        function renderFlow(data, fileLabel) {
          Troubleshooter.renderRuntime(runtimeEl, data, {
            analyticsContext: {
              flowSource: fileLabel === "builder preview" ? "builder_preview" : "default",
            },
          });
          loadedAtEl.textContent = (fileLabel === "builder preview" ? "Preview updated " : "Updated ") + new Date().toLocaleString();
        }

        function loadDefaultFlow() {
          return Troubleshooter.loadJsonUrl(defaultUrl).then(function (data) {
            renderFlow(data, defaultUrl);
            setStatus("", "success");
          });
        }

        function tryBuilderPreview() {
          var params = new URLSearchParams(window.location.search);
          if (params.get("source") !== "builder") {
            return Promise.reject(new Error("No builder preview requested."));
          }

          var raw = localStorage.getItem(previewKey);
          if (!raw) {
            return Promise.reject(new Error("No builder preview is stored yet."));
          }

          try {
            renderFlow(Troubleshooter.normalizeData(JSON.parse(raw)), "builder preview");
            setStatus("", "success");
            return Promise.resolve();
          } catch (error) {
            return Promise.reject(error);
          }
        }

        tryBuilderPreview().catch(function () {
          return loadDefaultFlow().catch(function (error) {
            if (typeof window.gtag === "function") {
              window.gtag("event", "troubleshooter_load_error", {
                flow_source: "default",
                error_message: String(error && error.message ? error.message : "unknown error").slice(0, 100),
              });
            }
            setStatus(error.message || "Could not load the troubleshooting form.", "error");
          });
        });
      })();
    </script>
  </body>
</html>
