    <script>
      (function redirectSupportRoute() {
        var path = location.pathname.replace(/\/+$/, "");
        var hash = location.hash || "";
        var isSupportPath = path === "/support";
        var isSupportHash = hash.indexOf("#/support") === 0;
        if (!isSupportPath && !isSupportHash) {
          return;
        }
        var query = location.search || "";
        var hashSuffix = "";
        if (isSupportHash) {
          hashSuffix = hash.slice("#/support".length);
        }
        location.replace("/support/" + query + hashSuffix);
      })();
    </script>

  <body>
    <script src="//unpkg.com/docsify-edit-on-github/index.js"></script>
    <div id="app"></div>
    <script>
      window.$docsify = {
        loadSidebar: true,
        nativeEmoji: true,
        executeScript: true,
        search: {
          placeholder: "Search the wiki",
          noData: "No results found",
          depth: 4,
        },
        plugins: [
          EditOnGithubPlugin.create(
            "https://github.com/SmokeSlate/BSS-Wiki/blob/main/docs/",
            "",
            function (file) {
              if (file == "README.md" || location.hash == "#/") {
                return "";
              } else {
                return "<small style='font-size:10px;'>📝 Edit Document</small>";
              }
            }
          ),
        ],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
